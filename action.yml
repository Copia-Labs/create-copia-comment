name: 'Create Copia Issue Comment'
description: 'Create or update a comment on an issue via the REST API'
author: 'Copia Automation'

inputs:
  token:
    default: ${{ github.token }}
  owner:
    description: 'Repository organization'
    required: true
  repo:
    description: 'Repository name'
    required: true
  issue_number:
    description: 'Issue index'
    required: true
  body:
    description: 'Comment body text'
    required: true
  comment_id:
    description: 'If provided, updates this comment instead of creating a new one'
    required: false
    default: ''
  server_url:
    description: 'Base URL of the Copia instance (e.g. https://app.copia.io). Defaults to GITHUB_SERVER_URL.'
    required: false
    default: ''

outputs:
  comment_id:
    description: 'The ID of the created or updated comment'
  comment_url:
    description: 'The HTML URL of the comment'
  json:
    description: 'The full JSON API response'

runs:
  using: 'node24'
  main: 'dist/index.js'
